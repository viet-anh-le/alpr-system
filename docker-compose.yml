version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/alpr
      - WEB_ORIGIN=http://localhost:3000,http://localhost:5173
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY}
      - AUTH_COOKIE_SECURE=false
      - AUTH_SESSION_TTL_HOURS=24
      - MAX_UPLOAD_MB=512
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_INTERNAL_RTSP_BASE=rtsp://mediamtx:8554
      - MEDIAMTX_PUBLIC_WEBRTC_BASE=http://localhost:8889
    depends_on:
      - mongo
      - mediamtx

  web:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: alpr-mediamtx
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
    volumes:
      - ./configs/mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
