version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/alpr
    depends_on:
      - mongo

  web:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: alpr-mediamtx
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
    volumes:
      - ./configs/mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
