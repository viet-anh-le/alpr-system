# MediaMTX runtime config for ALPR Event Monitor.
# All RTSP camera paths are added dynamically by FastAPI via the HTTP API.

api: yes
apiAddress: :9997

# MediaMTX v1.19+ protects the Control API with internal auth. Requests that
# reach the container through Docker port mapping come from a bridge IP, not
# 127.0.0.1, so allow API access only from loopback and private Docker ranges.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
  - user: any
    pass:
    ips: ["127.0.0.1", "::1", "172.16.0.0/12", "10.0.0.0/8"]
    permissions:
      - action: api
      - action: metrics
      - action: pprof

webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigin: '*'

rtspAddress: :8554
rtmp: no
hls: no

logLevel: info

paths: {}
